name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Cache go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Build
        run: CGO_ENABLED=1 go build -o cloud-tasks-emulator ./cmd/server

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install SQLite dev
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Run tests
        run: go test -v ./...

      - name: Run tests with race detector
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --out-format=colored-line-number

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t cloud-tasks-emulator:test .

      - name: Test Docker run
        run: |
          docker run -d --name emulator -p 8085:8085 -p 9090:9090 cloud-tasks-emulator:test
          sleep 3
          curl -sf http://localhost:8085/health
          curl -sf -X POST http://localhost:8085/v2/projects/local/locations/us-central1/queues \
            -H "Content-Type: application/json" \
            -d '{"queue":{"name":"test"}}'
          docker stop emulator
